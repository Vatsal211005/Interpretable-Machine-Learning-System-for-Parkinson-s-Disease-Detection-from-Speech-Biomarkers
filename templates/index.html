<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkinson Detection System</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-badge">AI Diagnostic Tool</div>
    <h1>Parkinson Detection<br>System</h1>
    <p class="header-subtitle">Machine learning–powered analysis and prediction</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="active" onclick="openTab('importance', this)">Feature Importance</button>
    <button onclick="openTab('bias', this)">Bias Variance</button>
    <button onclick="openTab('prediction', this)">Prediction</button>
  </div>

  <!-- Feature Importance Tab -->
  <div id="importance" class="tabcontent active">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">📊</div>
        <h2>Feature Importance</h2>
      </div>
      <div class="img-wrapper">
        <img src="/static/feature_importance.png" alt="Feature Importance Chart">
      </div>
    </div>
  </div>

  <!-- Bias Variance Tab -->
  <div id="bias" class="tabcontent">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">📈</div>
        <h2>Bias Variance Curve</h2>
      </div>
      <div class="img-wrapper">
        <img src="/static/learning_curve.png" alt="Learning Curve">
      </div>
    </div>
  </div>

  <!-- Prediction Tab -->
  <div id="prediction" class="tabcontent">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">🔬</div>
        <h2>Run Prediction</h2>
      </div>
      <div class="input-group">
        <span class="input-label">Input Features</span>
        <div class="input-row">
          <input id="inputFeatures" placeholder="e.g. 0.12, 0.45, 1.23, …" />
          <button class="btn-predict" onclick="predict()">Predict</button>
        </div>
      </div>
      <p id="result"></p>
    </div>
  </div>

  <script src="/static/script.js"></script>

  <script>
    function openTab(tabId, btn) {
      // Hide all tabs
      document.querySelectorAll('.tabcontent').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
      // Show selected
      document.getElementById(tabId).classList.add('active');
      if (btn) btn.classList.add('active');
    }
  </script>

</body>
</html>
